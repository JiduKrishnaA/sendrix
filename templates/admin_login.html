<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access | Sendrix</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .admin-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ff3b3b, #991111);
            color: #fff;
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 2px;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }
        .admin-border {
            border-color: rgba(255, 60, 60, 0.3) !important;
            box-shadow: 0 20px 60px rgba(255, 0, 0, 0.1), inset 0 1px 0 rgba(255,60,60,0.15) !important;
        }
        input[type="password"]:focus {
            border-color: #ff3b3b !important;
            box-shadow: 0 0 15px rgba(255, 59, 59, 0.2) !important;
        }
        .btn-admin {
            background: linear-gradient(135deg, #5c0000, #000) !important;
            border-color: rgba(255, 60, 60, 0.4) !important;
        }
        .btn-admin:hover {
            box-shadow: 0 10px 20px rgba(255, 0, 0, 0.3) !important;
        }
    </style>
</head>
<body>
    <div class="glass-container admin-border fade-in" style="max-width: 420px;">
        <div style="text-align: center;">
            <div class="admin-badge">⚠ Restricted Area</div>
        </div>
        <h2 style="font-size: 1.8rem; color: #ff5555; -webkit-text-fill-color: #ff5555; margin-bottom: 0.5rem;">Admin Panel</h2>
        <p style="text-align: center; color: var(--text-secondary); font-size: 0.85rem; margin-bottom: 2rem;">Authorized personnel only. All access is logged.</p>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash" style="background: rgba(255, 59, 59, 0.1); border-color: rgba(255, 59, 59, 0.3);">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>Admin Password</label>
                <input type="password" name="password" id="admin-password" required autofocus autocomplete="off" placeholder="Enter admin password">
            </div>
            <button type="submit" class="btn btn-admin" id="admin-login-btn">🔐 Enter Admin Panel</button>
        </form>

        <div style="text-align: center; margin-top: 2rem;">
            <a href="{{ url_for('login') }}" style="color: var(--text-secondary); font-size: 0.85rem;">← Back to User Login</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
